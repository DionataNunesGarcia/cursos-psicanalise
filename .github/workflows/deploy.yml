name: Deploy to Pantheon
on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: gd, mbstring, xml

      - name: Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader --ignore-platform-reqs

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.PANTHEON_SSH_KEY }}

      - name: Configure Git
        run: |
          git config --global user.email "deploy@pantheon.io"
          git config --global user.name "Pantheon Deploy Bot"
          ssh-keyscan -p 2222 codeserver.dev.5f4cfc0f-9aef-444d-a8f0-d14d742e7bff.drush.in >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy Code to Pantheon
        run: |
          git remote remove pantheon || true
          git remote add pantheon ssh://5f4cfc0f-9aef-444d-a8f0-d14d742e7bff@codeserver.dev.5f4cfc0f-9aef-444d-a8f0-d14d742e7bff.drush.in:2222/~/repository.git
          git add .
          git commit -m "Deploy from GitHub Actions" || echo "No changes to commit"
          git push pantheon main:master --force

      - name: Clear Cache
        run: |
          terminus auth:login --machine-token=${{ secrets.PANTHEON_MACHINE_TOKEN }}
          terminus drush cursos-psicanalise.dev -- cr