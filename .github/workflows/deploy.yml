name: Deploy to Pantheon
on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: gd, mbstring, xml

      - name: Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader --ignore-platform-reqs

      - name: Configure Git
        run: |
          git config --global user.email "deploy@pantheon.io"
          git config --global user.name "Pantheon Deploy Bot"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PANTHEON_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 2222 codeserver.dev.5f4cfc0f-9aef-444d-a8f0-d14d742e7bff.drush.in >> ~/.ssh/known_hosts 2>/dev/null || true
          cat >> ~/.ssh/config << EOF
          Host codeserver.dev.5f4cfc0f-9aef-444d-a8f0-d14d742e7bff.drush.in
            HostName codeserver.dev.5f4cfc0f-9aef-444d-a8f0-d14d742e7bff.drush.in
            Port 2222
            User codeserver
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking no
          EOF

      - name: Deploy Code to Pantheon
        run: |
          git remote add pantheon ssh://codeserver.dev.5f4cfc0f-9aef-444d-a8f0-d14d742e7bff.drush.in:2222/~/repository.git
          git push -u pantheon main:master --force